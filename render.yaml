services:
  - type: web
    name: finguard-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: SUPABASE_URL
        scope: build
        sync: false
      - key: SUPABASE_ANON_KEY
        scope: build
        sync: false
      - key: OPENAI_API_KEY
        scope: build
        sync: false
    rootDir: backend
